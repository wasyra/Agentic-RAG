services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rag-kb-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag_kb
      STORAGE_ROOT: /app/storage
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      REDIS_URL: redis://redis:6379/0
    volumes:
      - rag_web_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-kb-redis
    restart: unless-stopped

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rag-kb-worker
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag_kb
      STORAGE_ROOT: /app/storage
      REDIS_URL: redis://redis:6379/0
    volumes:
      - rag_web_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: rag-kb-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_kb
    ports:
      - "5432:5432"
    volumes:
      - rag_kb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_kb"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_USE_RAG_PROXY: "true"
    container_name: rag-kb-web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag_kb
      API_INTERNAL_URL: http://api:8000
      AI_SESSION_SECRET: local_docker_only_not_for_prod_use_min32chars_9f3a2b1c
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - rag_web_storage:/app/storage
    restart: unless-stopped

  # Uso: docker compose --profile tools run --rm migrate
  migrate:
    profiles: ["tools"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag_kb
    depends_on:
      db:
        condition: service_healthy
    command: npm run db:migrate

  # Ejecutar después de migrate la primera vez: docker compose --profile tools run --rm seed
  seed:
    profiles: ["tools"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag_kb
    depends_on:
      db:
        condition: service_healthy
    command: npm run db:seed

volumes:
  rag_kb_pgdata:
  rag_web_storage:
